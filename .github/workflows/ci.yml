name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Verify package import
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install dist/*.whl
          python -c "from weixin_reader.server import main; print(main.__name__)"
